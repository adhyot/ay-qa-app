<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adhyot QA</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: var(--color-surface-base);
      font-family: var(--font-sans);
    }
    .pin-card {
      width: 320px;
      background: var(--color-surface-card);
      border-radius: 20px;
      padding: 40px 32px;
      box-shadow: 0 8px 32px rgba(100,70,40,0.12);
      border: 1px solid rgba(180,150,110,0.2);
      text-align: center;
    }
    .brand-logo {
      width: 48px; height: 48px;
      background: var(--color-primary);
      color: #fff;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700;
      margin: 0 auto 16px;
    }
    .brand-name {
      font-size: 18px; font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 4px;
    }
    .brand-sub {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-bottom: 32px;
    }
    .pin-dots {
      display: flex; justify-content: center; gap: 14px;
      margin-bottom: 28px;
    }
    .pin-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid var(--color-surface-subtle);
      background: transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .pin-dot.filled {
      background: var(--color-primary);
      border-color: var(--color-primary);
    }
    .pin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }
    .pin-btn {
      padding: 16px;
      background: var(--color-surface-muted);
      border: 1px solid var(--color-surface-subtle);
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      color: var(--color-text-primary);
      cursor: pointer;
      transition: background 0.12s, transform 0.1s;
      font-family: var(--font-sans);
    }
    .pin-btn:hover { background: var(--color-surface-subtle); }
    .pin-btn:active { transform: scale(0.95); }
    .pin-btn.del {
      font-size: 14px;
      color: var(--color-text-muted);
    }
    .error-msg {
      color: #c33;
      font-size: 12px;
      margin-top: 8px;
      min-height: 18px;
    }
    input[name="pin"] { display: none; }
  </style>
</head>
<body>
<div class="pin-card">
  <div class="brand-logo">AQ</div>
  <div class="brand-name">Adhyot QA</div>
  <div class="brand-sub">Enter your access PIN</div>

  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>

  <form method="POST" id="pinForm">
    <input type="hidden" name="pin" id="pinInput" />
    <div class="pin-grid">
      {% for n in ['1','2','3','4','5','6','7','8','9','','0','⌫'] %}
      {% if n == '' %}
        <div></div>
      {% elif n == '⌫' %}
        <button type="button" class="pin-btn del" onclick="delDigit()">⌫</button>
      {% else %}
        <button type="button" class="pin-btn" onclick="addDigit('{{ n }}')">{{ n }}</button>
      {% endif %}
      {% endfor %}
    </div>
    {% with messages = get_flashed_messages() %}
      <div class="error-msg">{% if messages %}{{ messages[0] }}{% endif %}</div>
    {% endwith %}
  </form>
</div>

<script>
  let pin = '';
  function updateDots() {
    for (let i = 0; i < 4; i++) {
      document.getElementById('d' + i).classList.toggle('filled', i < pin.length);
    }
  }
  function addDigit(d) {
    if (pin.length >= 4) return;
    pin += d;
    updateDots();
    if (pin.length === 4) {
      document.getElementById('pinInput').value = pin;
      document.getElementById('pinForm').submit();
    }
  }
  function delDigit() {
    pin = pin.slice(0, -1);
    updateDots();
  }
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') addDigit(e.key);
    if (e.key === 'Backspace') delDigit();
  });
</script>
</body>
</html>
