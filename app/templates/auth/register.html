<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Adhyot QA</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--color-surface-base); }
    .auth-card {
      width: 400px;
      background: var(--color-surface-card);
      border-radius: var(--radius-tile);
      box-shadow: var(--shadow-card-hover);
      overflow: hidden;
    }
    .auth-header {
      background: var(--color-primary-dark);
      padding: 24px 28px 20px;
      text-align: center;
    }
    .auth-logo { font-size: 20px; font-weight: 700; color: var(--color-text-inverse); }
    .auth-tagline { font-size: 11px; color: rgba(253,250,245,0.5); margin-top: 3px; }
    .auth-body { padding: 26px 28px; }
    .auth-body h2 { font-size: 16px; font-weight: 600; color: var(--color-text-primary); margin-bottom: 18px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 5px; }
    .form-control {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--color-surface-subtle);
      border-radius: var(--radius-card);
      font-size: 13.5px;
      background: var(--color-surface-muted);
      color: var(--color-text-primary);
      outline: none;
      transition: border-color 0.15s;
      font-family: var(--font-sans);
    }
    .form-control:focus { border-color: var(--color-primary-mid); background: white; }
    .btn-block { width: 100%; justify-content: center; padding: 10px; font-size: 14px; margin-top: 4px; }
    .auth-footer { text-align: center; margin-top: 14px; font-size: 12.5px; color: var(--color-text-muted); }
    .flash-inline { padding: 10px 12px; border-radius: 6px; font-size: 12.5px; margin-bottom: 14px; }
    .flash-inline.flash-danger { background: var(--color-danger-bg); color: var(--color-danger); border-left: 3px solid var(--color-danger); }
    .divider-label { font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 14px 0 10px; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">&#9670; Adhyot QA</div>
      <div class="auth-tagline">Intelligent Quality Management</div>
    </div>
    <div class="auth-body">
      <h2>Create your workspace</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash-inline flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.register') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <div class="form-group">
          <label for="full_name">Your full name</label>
          <input id="full_name" name="full_name" type="text" class="form-control" required autofocus placeholder="Jane Smith" />
        </div>
        <div class="form-group">
          <label for="email">Work email</label>
          <input id="email" name="email" type="email" class="form-control" required placeholder="you@company.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" class="form-control" required placeholder="Min. 8 characters" minlength="8" />
        </div>

        <div class="divider-label">Your Organisation</div>

        <div class="form-group">
          <label for="org_name">Organisation name</label>
          <input id="org_name" name="org_name" type="text" class="form-control" required placeholder="Acme Corp QA" />
        </div>

        <button type="submit" class="btn btn-primary btn-block">Create Workspace</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
      </div>
    </div>
  </div>
</body>
</html>
